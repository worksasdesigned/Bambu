<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Testseite – Bambu-Gutschein</title>
  <script>
    if (location.protocol === 'https:') {
      location.replace('http://' + location.host + location.pathname + location.search + location.hash);
    }
  </script>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .ok { color: #10b981; }
    .bad { color: #ef4444; }
    pre { background:#0b1220;border:1px solid #24324a;padding:8px;border-radius:8px;white-space:pre-wrap }
  </style>
  <script>
    async function run(){
      const el = document.getElementById('out');
      const items = [];
      try {
        const res = await fetch('/health');
        const json = await res.json();
        items.push(`GET /health -> ${res.status} ${JSON.stringify(json)}`);
      } catch (e) {
        items.push(`GET /health FAILED: ${e}`);
      }
      try {
        const css = await fetch('/styles.css');
        items.push(`GET /styles.css -> ${css.status}`);
      } catch (e) {
        items.push(`GET /styles.css FAILED: ${e}`);
      }
      el.textContent = items.join('\n');
    }
    window.addEventListener('DOMContentLoaded', run);
  </script>
</head>
<body>
  <div class="container">
    <div class="card">
      <div style="font-weight:800;margin-bottom:8px">Testseite</div>
      <div class="label">Statische Dateien und Backend-Healthcheck</div>
      <pre id="out">lade…</pre>
      <div class="footer">Zurück zur App: <a href="/">/</a></div>
    </div>
  </div>
</body>
</html>
